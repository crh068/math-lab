<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學演示：標準位置角 v7</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --info: #3498db;
            --success: #27ae60;
            --bg: #f4f7f6;
            --highlight-red: #e74c3c;
            --math-blue: #0000FF; 
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .visual-panel { display: flex; flex-direction: column; align-items: center; }
        canvas { background: #fff; border: 1px solid #ddd; border-radius: 10px; }

        .teaching-panel { display: flex; flex-direction: column; gap: 15px; }
        .section { border-bottom: 1px solid #eee; padding-bottom: 15px; }
        h2 { color: var(--primary); margin: 0 0 10px 0; font-size: 1.5rem; }
        
        .def-box {
            background: #eef2f7;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            line-height: 1.6;
            border-left: 5px solid var(--info);
        }

        .calc-box {
            background: #fff9db;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #f1c40f;
        }

        .quadrant-result {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .slider-group { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        input[type="range"] { flex: 1; cursor: pointer; height: 12px; min-width: 250px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        button {
            padding: 8px;
            border: none;
            border-radius: 5px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; }

        .highlight-red { color: var(--highlight-red); font-weight: bold; }
        .highlight-accent { color: var(--accent); font-weight: bold; }
        .highlight-theta { color: var(--math-blue); font-weight: bold; font-size: 1.3rem; }
    </style>
</head>
<body>

    <h1>標準位置角 (Standard Position Angle)</h1>
    <p style="color: #666; font-weight: bold; margin-bottom: 20px;">1-1 教學演示：定義、畫法與象限判定</p>

    <div class="container">
        <div class="visual-panel">
            <canvas id="angleCanvas" width="420" height="420"></canvas>
            <div id="status-display" class="quadrant-result" style="width: 80%;">
                目前為：<span id="q-text">第一象限角</span>
            </div>
        </div>

        <div class="teaching-panel">
            <div class="section">
                <h2>1. 定義介紹</h2>
                <div class="def-box">
                    在直角座標平面上，若一個角的：<br>
                    (1) <span class="highlight-red">頂點</span> 位於原點 (0, 0)<br>
                    (2) <span class="highlight-red">始邊</span> 位於 x 軸正向<br>
                    則稱此角為「標準位置角」。
                </div>
            </div>

            <div class="section">
                <h2>2. 互動演示</h2>
                <div class="slider-group">
                    <label>角度：</label>
                    <input type="range" id="angleSlider" min="-720" max="720" value="45" step="1">
                    <span id="angleVal" class="highlight-accent" style="width: 65px; text-align: right;">45°</span>
                </div>
                <div class="btn-grid">
                    <button onclick="jumpTo(90)">90° (象限角)</button>
                    <button onclick="jumpTo(180)">180° (象限角)</button>
                    <button onclick="jumpTo(270)">270° (象限角)</button>
                    <button onclick="jumpTo(225)">225° (III)</button>
                    <button onclick="jumpTo(-45)">-45° (IV)</button>
                    <button onclick="jumpTo(0)" style="background:#95a5a6;">歸零</button>
                </div>
            </div>

            <div class="section">
                <h2>3. 計算與判定</h2>
                <div class="calc-box">
                    <div style="font-weight:bold; color:#2c3e50; margin-bottom:5px;">訣竅：找出最小正同界角 θ</div>
                    <div id="calc-process" style="margin-bottom: 8px; font-size: 1.2rem; color: #d35400; font-weight:bold;"></div>
                    <div id="calc-logic" style="color: #2c3e50; font-weight: bold; line-height: 1.5;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('angleCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('angleSlider');
        const angleVal = document.getElementById('angleVal');
        const calcProcess = document.getElementById('calc-process');
        const calcLogic = document.getElementById('calc-logic');
        const qText = document.getElementById('q-text');
        const statusDisplay = document.getElementById('status-display');

        const cx = 210, cy = 210, r = 160;

        function drawArrowHead(x1, y1, x2, y2, color) {
            const headlen = 10; 
            const angle = Math.atan2(y2 - y1, x2 - x1);
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
            ctx.lineTo(x2, y2);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawAxisArrow(x1, y1, x2, y2, color) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.stroke();
            drawArrowHead(x1, y1, x2, y2, color);
        }

        function update(deg) {
            const snapTargets = [-720, -630, -540, -450, -360, -270, -180, -90, 0, 90, 180, 270, 360, 450, 540, 630, 720];
            for(let t of snapTargets) {
                if(Math.abs(deg - t) <= 3) {
                    deg = t;
                    slider.value = t;
                    break;
                }
            }

            deg = parseInt(deg);
            angleVal.textContent = deg + "°";
            
            let k = Math.floor(deg / 360);
            let alpha = deg - k * 360; 
            
            calcProcess.innerHTML = `${deg}° = 360° &times; (${k}) + <span class="highlight-theta">${alpha}°</span>`;
            
            let result = "";
            let bgColor = "";
            let logicText = "";

            if (alpha === 0 || alpha === 90 || alpha === 180 || alpha === 270) {
                result = "象限角"; bgColor = "#ecf0f1";
                logicText = `終邊落在軸上，不屬於任何象限。`;
            } else if (alpha > 0 && alpha < 90) {
                result = "第一象限角"; bgColor = "#d5f5e3";
                logicText = `因為 0° < ${alpha}° < 90°，故終邊在第一象限。`;
            } else if (alpha > 90 && alpha < 180) {
                result = "第二象限角"; bgColor = "#d6eaf8";
                logicText = `因為 90° < ${alpha}° < 180°，故終邊在第二象限。`;
            } else if (alpha > 180 && alpha < 270) {
                result = "第三象限角"; bgColor = "#fcf3cf";
                logicText = `因為 180° < ${alpha}° < 270°，故終邊在第三象限。`;
            } else {
                result = "第四象限角"; bgColor = "#f5b7b1";
                logicText = `因為 270° < ${alpha}° < 360°，故終邊在第四象限。`;
            }
            
            qText.textContent = result;
            statusDisplay.style.backgroundColor = bgColor;
            calcLogic.innerHTML = logicText;

            draw(deg);
        }

        function draw(totalDeg) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawAxisArrow(20, cy, canvas.width - 20, cy, "#888"); 
            drawAxisArrow(cx, canvas.height - 20, cx, 20, "#888"); 
            ctx.fillStyle = "#666";
            ctx.font = "bold 16px Arial";
            ctx.fillText("x", canvas.width - 15, cy + 20);
            ctx.fillText("y", cx - 20, 15);

            ctx.fillStyle = "#bdc3c7";
            ctx.font = "bold 22px 'Times New Roman'";
            ctx.fillText("I", cx + 160, cy - 160);
            ctx.fillText("II", cx - 185, cy - 160);
            ctx.fillText("III", cx - 185, cy + 185);
            ctx.fillText("IV", cx + 160, cy + 185);

            ctx.beginPath();
            ctx.strokeStyle = "#2c3e50";
            ctx.lineWidth = 4;
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + r, cy);
            ctx.stroke();
            ctx.fillStyle = "#95a5a6";
            ctx.font = "14px Arial";
            ctx.fillText("始邊", cx + r - 30, cy + 20);

            if (totalDeg !== 0) {
                ctx.beginPath();
                ctx.strokeStyle = "rgba(231, 76, 60, 0.7)";
                ctx.lineWidth = 2;
                let steps = Math.abs(totalDeg);
                let direction = totalDeg > 0 ? -1 : 1;
                let lastX, lastY, prevX, prevY;

                for(let i=0; i<=steps; i++) {
                    let currentRad = (i * direction) * Math.PI / 180;
                    let currentR = 15 + (i / steps) * 25; 
                    let x = cx + currentR * Math.cos(currentRad);
                    let y = cy + currentR * Math.sin(currentRad);
                    if(i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                    
                    if(i === steps-1) { prevX = x; prevY = y; }
                    if(i === steps) { lastX = x; lastY = y; }
                }
                ctx.stroke();
                drawArrowHead(prevX, prevY, lastX, lastY, "rgba(231, 76, 60, 1)");

                ctx.fillStyle = "rgba(231, 76, 60, 1)";
                ctx.font = "bold 15px Arial";
                ctx.textAlign = (lastX > cx) ? "left" : "right";
                ctx.fillText(`${totalDeg}°`, lastX + (lastX > cx ? 12 : -12), lastY + (lastY > cy ? 15 : -5));
            }

            let endRad = -totalDeg * Math.PI / 180;
            let endX = cx + r * Math.cos(endRad);
            let endY = cy + r * Math.sin(endRad);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = "#3498db";
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.fillStyle = "#3498db";
            ctx.font = "14px Arial";
            ctx.textAlign = (endX > cx) ? "left" : "right";
            ctx.fillText("終邊", endX + (endX > cx ? 5 : -5), endY + (endY > cy ? 15 : -5));
            
            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, Math.PI*2);
            ctx.fillStyle = "black";
            ctx.fill();
        }

        function jumpTo(val) { slider.value = val; update(val); }
        slider.addEventListener('input', (e) => update(e.target.value));
        
        update(45); 
    </script>
</body>
</html>
